services: 
  app:
    user: "${UID}:${GID}"
    build: 
      context: .
      dockerfile: docker/php.Dockerfile
    container_name: syshosp
    volumes:
      - .:/var/www/html
    networks:
      - syshosp_network
  
  nginx:
    image: nginx:alpine
    container_name: syshosp_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - syshosp_network
  
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    env_file:
      - ./docker/.env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - syshosp_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8081:80"
    env_file:
      - ./docker/.env
    depends_on:
      - db
    networks:
      - syshosp_network

networks:
  syshosp_network:
    driver: bridge

volumes:
  db_data: